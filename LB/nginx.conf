# Minimal nginx config — targets ~5 MB RSS under 100+ VUs.
#
# Single worker; no access logs; small buffers; persistent upstream pool via
# Unix Domain Sockets (mounted on a shared tmpfs volume) to skip TCP loopback.

worker_processes 1;
worker_rlimit_nofile 4096;

daemon off;
error_log /dev/stderr crit;

events {
    worker_connections 512;
    multi_accept on;
}

http {
    access_log off;
    server_tokens off;

    open_file_cache off;

    # Tight buffers. Payloads in this challenge are <1 KB.
    client_body_buffer_size 1k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 4k;
    client_max_body_size 8k;

    sendfile off;
    tcp_nodelay on;

    keepalive_timeout 65s;
    keepalive_requests 10000;

    # Upstream pool over Unix Domain Sockets — saves the ~30µs of TCP
    # loopback round-trip per request that we'd pay with `server api:8080`.
    upstream rinha_api {
        server unix:/run/sock/api1.sock;
        server unix:/run/sock/api2.sock;
        keepalive 64;
        keepalive_requests 10000;
        keepalive_timeout 60s;
    }

    server {
        listen 9999 default_server reuseport;
        listen [::]:9999 default_server reuseport;

        location / {
            proxy_pass http://rinha_api;

            # Force HTTP/1.1 + empty Connection header so the upstream
            # keepalive pool gets reused.
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_buffering off;
            proxy_request_buffering off;

            proxy_connect_timeout 1s;
            proxy_send_timeout 2s;
            proxy_read_timeout 2s;

            proxy_next_upstream error timeout;
        }
    }
}

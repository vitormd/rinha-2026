# Minimal nginx config for the rinha26 LB. Targets ~5 MB RSS under 100 VUs.
#
# Runs as a single worker; no access logs; small buffers; persistent upstream
# pool to avoid TCP handshakes on every request.

worker_processes 1;
worker_rlimit_nofile 4096;

# Daemon off so docker can supervise the process directly.
daemon off;

# Crit-only error log to stderr to keep buffer footprint minimal.
error_log /dev/stderr crit;

events {
    worker_connections 512;
    multi_accept on;
}

http {
    access_log off;
    server_tokens off;

    # No file serving — we don't need any of these caches.
    open_file_cache off;

    # Tight buffers. Payloads in this challenge are <1 KB.
    client_body_buffer_size 1k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 4k;
    client_max_body_size 8k;

    # No need for sendfile (we never serve files).
    sendfile off;
    tcp_nodelay on;

    # Connection-level keepalive between client (k6) and nginx.
    keepalive_timeout 65s;
    keepalive_requests 10000;

    # Upstream pool: persistent connections to both API instances.
    upstream rinha_api {
        server api1:8080;
        server api2:8080;
        # Pool of idle keepalive conns held open per worker.
        keepalive 64;
        keepalive_requests 10000;
        keepalive_timeout 60s;
    }

    server {
        listen 9999 default_server reuseport;
        listen [::]:9999 default_server reuseport;

        # Catch-all: proxy everything to the upstream pool. Per challenge
        # rules, the LB cannot inspect/modify payloads — just forward.
        location / {
            proxy_pass http://rinha_api;

            # Force HTTP/1.1 and clear Connection header so the upstream
            # keepalive pool actually gets reused.
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Don't buffer the small JSON responses.
            proxy_buffering off;
            proxy_request_buffering off;

            # Tight timeouts; the API target is sub-millisecond.
            proxy_connect_timeout 1s;
            proxy_send_timeout 2s;
            proxy_read_timeout 2s;

            proxy_next_upstream error timeout;
        }
    }
}

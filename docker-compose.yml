# Rinha de Backend 2026 — submission stack
#
# Total budget across all services: 1.0 CPU, 350 MB RAM.
# Layout (CPU / mem):
#   proxy: 0.10 / 20 MB    nginx:alpine-slim
#   api1:  0.45  / 165 MB
#   api2:  0.45  / 165 MB
#                                = 1.00 / 350 MB

services:
  api1:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: rinha26-api:latest
    environment:
      LISTEN_ADDR: ":8080"
      GOMAXPROCS: "1"
      GOMEMLIMIT: "150MiB"
      N_PROBE_FAST: "${N_PROBE_FAST:-8}"
      N_PROBE_FULL: "${N_PROBE_FULL:-28}"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165M"

  api2:
    image: rinha26-api:latest
    environment:
      LISTEN_ADDR: ":8080"
      GOMAXPROCS: "1"
      GOMEMLIMIT: "150MiB"
      N_PROBE_FAST: "${N_PROBE_FAST:-8}"
      N_PROBE_FULL: "${N_PROBE_FULL:-28}"
    networks:
      - rinha
    depends_on:
      - api1
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165M"

  proxy:
    image: nginx:alpine-slim
    command: ["nginx", "-c", "/etc/nginx/nginx.conf"]
    volumes:
      - ./LB/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    networks:
      - rinha
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20M"

networks:
  rinha:
    driver: bridge

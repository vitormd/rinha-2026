# Rinha de Backend 2026 — submission stack (v2).
#
# Pulls the API image pre-built (multi-stage build with baked ivf.bin) from
# Docker Hub. nginx ↔ Go APIs talk over Unix Domain Sockets on a shared
# tmpfs volume (`sock`) — no TCP loopback in the data path.
#
# Total budget: 1.0 CPU (api×0.40 + api×0.40 + proxy×0.20), 350 MB RAM.

services:
  api1: &api
    image: vitormd/rinha26-api:vitormd-go-v3
    environment:
      LISTEN_ADDR: "/run/sock/api1.sock"
      GOMAXPROCS: "1"
      GOMEMLIMIT: "150MiB"
      N_PROBE_FAST: "8"
      N_PROBE_FULL: "28"
    volumes:
      - sock:/run/sock
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165M"

  api2:
    <<: *api
    environment:
      LISTEN_ADDR: "/run/sock/api2.sock"
      GOMAXPROCS: "1"
      GOMEMLIMIT: "150MiB"
      N_PROBE_FAST: "8"
      N_PROBE_FULL: "28"

  proxy:
    image: nginx:alpine-slim
    command: ["nginx", "-c", "/etc/nginx/nginx.conf"]
    volumes:
      - ./LB/nginx.conf:/etc/nginx/nginx.conf:ro
      - sock:/run/sock
    ports:
      - "9999:9999"
    networks:
      - rinha
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20M"

volumes:
  sock:

networks:
  rinha:
    driver: bridge
